<!DOCTYPE html>
<!-- Este é um doctype ou DTD, o que define o tipo de HTML a ser carregado na máquina do cliente, ele informa ao navegador qual conjunto de bibliotecas carregar para que todo a estrutura seja otmizada de forma rápida e segura.-->
<!-- Eu sou um comentário em HTML, eu sou ignorado pelo interpretador do navegador e não sou apresentado aos usuários. -->

<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Primeira Página</title>
	</head>
	<body>
		<h1>Bem vindo!</h1>
	</body>
</html>
